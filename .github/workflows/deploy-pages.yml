name: Publicar frontend en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Construir el frontend
        env:
          # Configurar en Settings → Secrets and variables → Actions → Variables.
          VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build:client
      - uses: actions/configure-pages@v5
        # Habilita Pages desde el propio workflow: evita depender de activarlo
        # a mano en Settings, paso que suele no persistir en la interfaz.
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
